name: 🚨 Optic Auto-Healer Pipeline

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write
  pull-requests: write
  statuses: write

jobs:
  super-linter:
    name: Run Super-Linter
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download your Tic-Tac-Toe game code
      - name: Checkout Tic-Tac-Toe Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Step 2: Run the Super Linter and force it to save a JSON report
      - name: Lint Code Base
        uses: github/super-linter@v5.0.0
        env:
          VALIDATE_ALL_CODEBASE: false
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 🚨 CRITICAL: This tells Super Linter to output its logs as a JSON file
          OUTPUT_FORMAT: json
          OUTPUT_FOLDER: ./

      # Step 3: THIS IS THE TRIGGER. It runs ONLY if Step 2 fails!
      - name: Trigger Optic AI Healer on Failure
        if: failure()
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🤖 Super Linter failed! Cloning the Optic Cloud Brain..."
          # Clone your separate Optic repo right next to the Tic-Tac-Toe folder
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/deepanshg3/optic.git optic_brain
          
          echo "📦 Installing Optic requirements..."
          pip install google-generativeai python-dotenv
          
          echo "🧠 Executing Optic Orchestrator..."
          # Run the orchestrator file we built inside the super_linter module
          python optic_brain/backend/super_linter/orchestrator.py