name: 🚨 Optic Auto-Healer Pipeline

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write
  pull-requests: write
  statuses: write

jobs:
  super-linter:
    name: Run Super-Linter
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download your Tic-Tac-Toe game code
      - name: Checkout Tic-Tac-Toe Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Step 2: Run the Super Linter and force it to save a JSON report
      - name: Lint Code Base
        uses: github/super-linter@v5.0.0
        env:
          VALIDATE_ALL_CODEBASE: false
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OUTPUT_FORMAT: json
          OUTPUT_FOLDER: ./

      # Step 3: Trigger Optic AI Healer on Failure
      - name: Trigger Optic AI Healer on Failure
        if: failure()
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🤖 Super Linter failed! Cloning the Optic Cloud Brain..."
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/deepanshg3/optic.git optic_brain
          
          echo "📦 Installing Optic requirements..."
          pip install -r optic_brain/requirements.txt
          
          echo "🔍 Locating Orchestrator dynamically..."
          ORCHESTRATOR_PATH=$(find optic_brain -name "orchestrator.py" | head -n 1)
          
          if [ -z "$ORCHESTRATOR_PATH" ]; then
            echo "❌ CRITICAL ERROR: Could not find orchestrator.py! Printing cloned directory structure:"
            ls -R optic_brain
            exit 1
          fi
          
          echo "🧠 Executing Optic Orchestrator at: $ORCHESTRATOR_PATH"
          cd "$(dirname "$ORCHESTRATOR_PATH")"
          python orchestrator.py